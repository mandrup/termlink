<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img">
  <title>termlink terminal UI</title>
  <desc>A terminal window showing termlink: a connection list grouped into Infra and Dev on the left, a detail panel with connection fields and a notes sidebar on the right, and a status bar of keyboard shortcuts along the bottom.</desc>

  <rect x="0" y="0" width="900" height="560" rx="10" fill="#0d1117"/>
  <rect x="0" y="0" width="900" height="30" rx="10" fill="#161b22"/>
  <rect x="0" y="20" width="900" height="10" fill="#161b22"/>
  <circle cx="18" cy="15" r="6" fill="#f85149"/>
  <circle cx="38" cy="15" r="6" fill="#d29922"/>
  <circle cx="58" cy="15" r="6" fill="#3fb950"/>
  <text x="450" y="19" font-size="12" fill="#6e7681" text-anchor="middle">termlink</text>

  <rect x="24" y="46" width="76" height="20" rx="3" fill="#db61a2"/>
  <text x="32" y="60" font-size="13" fill="#0d1117" font-weight="bold">termlink</text>
  <text x="112" y="60" font-size="13" fill="#6e7681">RDP / SSH connection manager</text>
  <text x="876" y="60" font-size="13" fill="#6e7681" text-anchor="end">5 hosts</text>

  <text x="24" y="90" font-size="13" fill="#39c5cf">/</text>
  <text x="38" y="90" font-size="13" fill="#6e7681">press / to filter &#183; ? for help</text>

  <rect x="24" y="104" width="310" height="378" rx="6" fill="none" stroke="#39c5cf" stroke-width="1"/>
  <text x="36" y="128" font-size="13" fill="#c9d1d9" font-weight="bold">&#9662; Infra (3)</text>

  <rect x="32" y="138" width="290" height="20" fill="#39c5cf"/>
  <text x="36" y="152" font-size="13" fill="#0d1117">&#9492; &#9654; </text>
  <text x="58" y="152" font-size="13" fill="#3fb950">&#9679;</text>
  <text x="72" y="152" font-size="13" fill="#0d1117">bastion-01</text>

  <text x="36" y="176" font-size="13" fill="#6e7681">&#9500;</text>
  <text x="58" y="176" font-size="13" fill="#58a6ff">&#9675;</text>
  <text x="72" y="176" font-size="13" fill="#c9d1d9">db-primary</text>

  <text x="36" y="200" font-size="13" fill="#6e7681">&#9492;</text>
  <text x="58" y="200" font-size="13" fill="#d29922">&#9675;</text>
  <text x="72" y="200" font-size="13" fill="#c9d1d9">win-app-01</text>

  <text x="36" y="230" font-size="13" fill="#c9d1d9" font-weight="bold">&#9662; Dev (2)</text>
  <text x="36" y="254" font-size="13" fill="#6e7681">&#9500;</text>
  <text x="58" y="254" font-size="13" fill="#58a6ff">&#9675;</text>
  <text x="72" y="254" font-size="13" fill="#c9d1d9">dev-box</text>
  <text x="36" y="278" font-size="13" fill="#6e7681">&#9492;</text>
  <text x="58" y="278" font-size="13" fill="#d29922">&#9675;</text>
  <text x="72" y="278" font-size="13" fill="#c9d1d9">win-test</text>

  <rect x="350" y="104" width="526" height="378" rx="6" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="364" y="128" font-size="13" fill="#c9d1d9" font-weight="bold">bastion-01</text>
  <rect x="452" y="116" width="42" height="18" rx="2" fill="#58a6ff"/>
  <text x="459" y="129" font-size="12" fill="#042c53" font-weight="bold">SSH</text>
  <text x="364" y="142" font-size="13" fill="#30363d">&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;</text>

  <text x="364" y="170" font-size="13" fill="#6e7681">Host</text>
  <text x="472" y="170" font-size="13" fill="#c9d1d9">bastion.internal.local</text>
  <text x="364" y="192" font-size="13" fill="#6e7681">Port</text>
  <text x="472" y="192" font-size="13" fill="#c9d1d9">22</text>
  <text x="364" y="214" font-size="13" fill="#6e7681">Group</text>
  <text x="472" y="214" font-size="13" fill="#c9d1d9">Infra</text>
  <text x="364" y="236" font-size="13" fill="#6e7681">User</text>
  <text x="472" y="236" font-size="13" fill="#c9d1d9">root</text>
  <text x="364" y="258" font-size="13" fill="#6e7681">Identity File</text>
  <text x="472" y="258" font-size="13" fill="#c9d1d9">~/.ssh/id_ed25519</text>

  <text x="364" y="300" font-size="13" fill="#6e7681">Created</text>
  <text x="472" y="300" font-size="13" fill="#c9d1d9">1/2/2026, 9:14 AM</text>
  <text x="364" y="322" font-size="13" fill="#6e7681">Updated</text>
  <text x="472" y="322" font-size="13" fill="#c9d1d9">&#8212;</text>
  <text x="364" y="344" font-size="13" fill="#6e7681">Last connected</text>
  <text x="480" y="344" font-size="13" fill="#3fb950">&#9679;</text>
  <text x="494" y="344" font-size="13" fill="#c9d1d9">1/2/2026, 9:41 AM</text>

  <line x1="660" y1="118" x2="660" y2="360" stroke="#30363d" stroke-width="1"/>
  <text x="676" y="128" font-size="13" fill="#6e7681">Notes</text>
  <text x="676" y="150" font-size="13" fill="#c9d1d9">Primary bastion host</text>
  <text x="676" y="172" font-size="13" fill="#c9d1d9">Reboot monthly</text>

  <rect x="24" y="494" width="852" height="26" rx="4" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="36" y="511" font-size="11" fill="#c9d1d9">
    <tspan fill="#39c5cf" font-weight="bold">&#8593;&#8595;</tspan><tspan fill="#6e7681"> move  &#183;  </tspan><tspan fill="#39c5cf" font-weight="bold">&#8592;&#8594;</tspan><tspan fill="#6e7681"> fold  &#183;  </tspan><tspan fill="#39c5cf" font-weight="bold">enter</tspan><tspan fill="#6e7681"> connect  &#183;  </tspan><tspan fill="#39c5cf" font-weight="bold">a</tspan><tspan fill="#6e7681"> add  &#183;  </tspan><tspan fill="#39c5cf" font-weight="bold">c</tspan><tspan fill="#6e7681"> clone  &#183;  </tspan><tspan fill="#39c5cf" font-weight="bold">e</tspan><tspan fill="#6e7681"> edit  &#183;  </tspan><tspan fill="#39c5cf" font-weight="bold">d</tspan><tspan fill="#6e7681"> delete  &#183;  </tspan><tspan fill="#39c5cf" font-weight="bold">/</tspan><tspan fill="#6e7681"> search  &#183;  </tspan><tspan fill="#39c5cf" font-weight="bold">q</tspan><tspan fill="#6e7681"> quit</tspan>
  </text>
</svg>
